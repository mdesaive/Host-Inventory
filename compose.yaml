            --username "$$USERNAME" \
            --password "$$PASSWORD" \
            --no-verify-ssl \
            > /textfiles/vmware_vcsim.prom \
            || echo "[sidecar_vcsim] Export failed, retrying in $$SCRAPE_INTERVAL s"
